{% extends 'email_base.html' %}

{% block conteudo %}
    <p style="margin-bottom: 16px;">Olá!</p>
    <p style="margin-bottom: 56px;">
        O Fornecedor <strong>{{ usuario }}</strong> Solicitou Alterações no Cronograma <strong>{{ solicitacao }}</strong> de <strong>{{ nome_produto }}</strong> em {{log_transicao.criado_em|date:"d/m/Y"}}: <br>
    </p>
    <u>
        <a href="{{ url }}">
            Clique aqui para acessar os detalhes da <strong>Solicitação de Alteração</strong>
        </a>
    </u>
{% endblock %}
